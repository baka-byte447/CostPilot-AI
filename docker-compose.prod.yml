version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: costpilot_backend_prod
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - JWT_SECRET=${JWT_SECRET}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - postgres
      - redis
    networks:
      - prod_network

  postgres:
    image: postgres:15-alpine
    container_name: costpilot_postgres_prod
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-costpilot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-supersecret}
      POSTGRES_DB: ${POSTGRES_DB:-costpilot_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - prod_network

  redis:
    image: redis:7-alpine
    container_name: costpilot_redis_prod
    restart: always
    volumes:
      - redis_data:/data
    networks:
      - prod_network

  nginx:
    image: nginx:alpine
    container_name: costpilot_nginx_prod
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
    networks:
      - prod_network

volumes:
  postgres_data:
  redis_data:

networks:
  prod_network:
    driver: bridge
