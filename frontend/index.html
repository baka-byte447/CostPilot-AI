<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CostPilot Minimal Dashboard</title>
  <style>
    :root {
      --bg: #f5f5f7;
      --card: #ffffff;
      --text: #1f2933;
      --muted: #5b6670;
      --accent: #0f766e;
      --border: #d5d7db;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 24px;
      font-family: "Segoe UI", Tahoma, sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    h1 {
      margin: 0 0 12px;
      font-size: 24px;
      letter-spacing: 0.2px;
    }
    .wrap {
      max-width: 960px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      box-shadow: 0 1px 2px rgba(0,0,0,0.05);
    }
    label {
      font-size: 14px;
      color: var(--muted);
    }
    input {
      width: 100%;
      padding: 10px;
      margin-top: 6px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 14px;
    }
    .row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }
    button {
      padding: 10px 14px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: #e7f4f2;
      color: var(--accent);
      font-weight: 600;
      cursor: pointer;
    }
    button:hover {
      background: #d9eeeb;
    }
    pre {
      background: #0b1021;
      color: #e5e7eb;
      padding: 12px;
      border-radius: 6px;
      font-size: 13px;
      overflow: auto;
      margin: 0;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 12px;
    }
    .small {
      font-size: 13px;
      color: var(--muted);
    }
    .status {
      margin-top: 10px;
      font-size: 13px;
      color: var(--muted);
    }
    .status strong {
      color: var(--text);
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>CostPilot Minimal Dashboard</h1>
      <div class="small">Quick view of health and system metrics from the FastAPI backend.</div>
    </header>

    <section class="card">
      <label for="base-url">Backend base URL</label>
      <input id="base-url" value="http://localhost:8000" />
      <div class="row" style="margin-top: 10px;">
        <button id="btn-health">Check Health</button>
        <button id="btn-metrics">Load System Metrics</button>
        <button id="btn-refresh">Refresh All</button>
      </div>
      <div id="status-line" class="status">Ready.</div>
    </section>

    <section class="grid">
      <div class="card">
        <div class="small" style="margin-bottom:6px;">Health</div>
        <pre id="health-box">(no data)</pre>
      </div>
      <div class="card">
        <div class="small" style="margin-bottom:6px;">Metrics summary</div>
        <pre id="metrics-box">(no data)</pre>
      </div>
    </section>

    <section class="card">
      <div class="small" style="margin-bottom:6px;">Raw metrics JSON</div>
      <pre id="raw-box">(no data)</pre>
    </section>
  </div>

  <script>
    const baseInput = document.getElementById("base-url");
    const healthBox = document.getElementById("health-box");
    const metricsBox = document.getElementById("metrics-box");
    const rawBox = document.getElementById("raw-box");
    const btnHealth = document.getElementById("btn-health");
    const btnMetrics = document.getElementById("btn-metrics");
    const btnRefresh = document.getElementById("btn-refresh");
    const statusLine = document.getElementById("status-line");
    const STORAGE_KEY = "costpilot.baseUrl";

    // Persist backend URL so the dashboard remembers local/dev environments.
    const savedBase = localStorage.getItem(STORAGE_KEY);
    if (savedBase) {
      baseInput.value = savedBase;
    }
    baseInput.addEventListener("change", () => {
      localStorage.setItem(STORAGE_KEY, baseInput.value.trim());
    });

    function setStatus(message) {
      statusLine.textContent = message;
    }

    function setButtonsDisabled(disabled) {
      btnHealth.disabled = disabled;
      btnMetrics.disabled = disabled;
      btnRefresh.disabled = disabled;
    }

    function buildUrl(path) {
      const trimmed = baseInput.value.trim().replace(/\/$/, "");
      return trimmed + path;
    }

    async function fetchJson(path) {
      const url = buildUrl(path);
      const res = await fetch(url, {
        headers: {
          "Accept": "application/json"
        }
      });
      if (!res.ok) throw new Error(`${res.status} ${res.statusText}`);
      return res.json();
    }

    function show(target, data) {
      target.textContent = JSON.stringify(data, null, 2);
    }

    function showError(target, err) {
      target.textContent = `error: ${err.message || err}`;
    }

    function toNumber(value) {
      const n = Number(value);
      return Number.isFinite(n) ? n : null;
    }

    function buildMetricsView(summary) {
      const cpu = toNumber(summary.avg_cpu_percent);
      const mem = toNumber(summary.avg_memory_percent);
      const req = toNumber(summary.total_requests);

      return {
        cpu_utilization: cpu !== null ? `${cpu.toFixed(2)}%` : "n/a",
        memory_utilization: mem !== null ? `${mem.toFixed(2)}%` : "n/a",
        total_requests: req !== null ? Math.round(req) : "n/a",
        sample_count: toNumber(summary.sample_count) ?? "n/a"
      };
    }

    async function loadHealth() {
      try {
        const data = await fetchJson("/health");
        show(healthBox, data);
      } catch (err) {
        showError(healthBox, err);
      }
    }

    async function loadMetrics() {
      try {
        const data = await fetchJson("/api/system-metrics");
        const summary = data.summary || {};
        show(metricsBox, buildMetricsView(summary));
        show(rawBox, data);
      } catch (err) {
        showError(metricsBox, err);
        showError(rawBox, err);
      }
    }

    async function refreshAll() {
      const base = baseInput.value.trim();
      if (!base) {
        setStatus("Enter a backend URL before requesting data.");
        return;
      }

      localStorage.setItem(STORAGE_KEY, base);
      setButtonsDisabled(true);
      setStatus(`Fetching data from ${base}...`);

      const start = performance.now();
      try {
        await Promise.all([loadHealth(), loadMetrics()]);
        const elapsed = performance.now() - start;
        setStatus(`Updated successfully in ${elapsed.toFixed(0)}ms.`);
      } catch (err) {
        setStatus(`Refresh failed: ${err.message || err}`);
      } finally {
        setButtonsDisabled(false);
      }
    }

    btnHealth.addEventListener("click", loadHealth);
    btnMetrics.addEventListener("click", loadMetrics);
    btnRefresh.addEventListener("click", refreshAll);
    baseInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        refreshAll();
      }
    });

    // basic auto-load on start
    refreshAll();
  </script>
</body>
</html>
