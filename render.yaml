services:
  - type: web
    name: costpilot-free
    plan: free
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT --chdir . dashboard.app:app
    envVars:
      - key: ENV
        value: production
      - key: DB_PATH
        value: ./optimizer.db
      - key: PYTHON_VERSION
        value: 3.11.0
    healthCheckPath: /healthz
