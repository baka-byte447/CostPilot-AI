version: "3.9"

services:
    prometheus: 
        image: prom/prometheus
        container_name: prometheus
        volumes:
            - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
            ports:
             - "9090:9090"

    node_exporter:
        image:prom/node_exporter
        container_name: node_exporter
        ports:
            - "9100:9100"

    backend:
        build: ./backend
        container_name : backend
        ports:
            - "8000:8000"
        depends_on:
         - prometheus